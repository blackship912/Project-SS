?'♥':'♡'}</button></article>`}function renderHome(){let top=[...props].sort((a,b)=>b.score-a.score)[0];home.innerHTML=header('Project:SS')+`<section class="card hero"><div class="score-row"><div><p class="score-label">注目物件 Shonai Score</p><p class="score">${top.score}<small>/100</small></p><span class="pill" style="${st(top)}">${statuses[top.status][2]} ${top.status}・${top.title}</span></div><div class="ring" style="--p:${top.score}"><span>${top.score}</span></div></div><p style="font-size:13px;color:#3c473f;line-height:1.8;margin-top:12px">見送った物件も、経験値として保存。比較しながら判断力を育てます。</p></section><section class="card"><input class="search" placeholder="地区・タグ・見送り理由で検索" oninput="filterList(this.value)"><div class="chips">${['all','候補','調査中','保留','見送り','購入済'].map(x=>`<button class="chip ${filter===x?'on':''}" onclick="filter='${x}';renderHome()">${x==='all'?'すべて':x}</button>`).join('')}</div></section><div id="list">${props.filter(p=>filter==='all'||p.status===filter).map(card).join('')}</div>`}function filterList(q){q=q.toLowerCase();list.innerHTML=props.filter(p=>JSON.stringify(p).toLowerCase().includes(q)).map(card).join('')}function toggleFav(id){let p=props.find(x=>x.id===id);p.favorite=!p.favorite;renderHome();if(favScreen.classList.contains('active'))renderFav()}function renderFav(){let a=props.filter(p=>p.favorite);favScreen.innerHTML=header('お気に入り','気になる物件だけ')+`<section class="card hero"><p class="card-title">❤️ お気に入り ${a.length}件</p><p style="font-size:13px;color:var(--muted)">比較候補にしたい物件をここに集めます。</p></section>${a.map(card).join('')||'<section class="card">まだお気に入りはありません。</section>'}`}function openDetail(id){current=props.find(p=>p.id===id);panel=0;renderDetail();nav('detail')}function renderDetail(){let p=current;detail.innerHTML=`<header class="detail-head"><button class="round" onclick="nav('home')">←</button><div class="detail-title"><p class="tiny">物件カルテ</p><h1>${p.title}</h1></div><button class="round" onclick="statusSheet()">⋯</button></header><div class="gallery"><div class="gal-view" onclick="openFS()"><div class="slide">🏠</div><span class="counter">1 / 1</span><button class="gal-btn edit" onclick="event.stopPropagation();openPhotoSheet()">…</button><button class="gal-btn add" onclick="event.stopPropagation();openPhotoSheet()">＋</button></div><div class="photo-tags"><span class="tag">🏠 外観</span><span class="tag">🅿 駐車場</span><span class="tag">📝 写真メモ</span></div></div><div class="tabs">${['基本','調査','メモ','ログ'].map((t,i)=>`<button class="${panel===i?'on':''}" onclick="setPanel(${i})">${t}</button>`).join('')}</div><section class="card hero"><div class="score-row"><div><p class="score-label">Shonai Score</p><p class="score">${p.score}<small>/100</small></p><span class="pill" style="${st(p)}">${statuses[p.status][2]} ${p.status}</span></div><div class="ring" style="--p:${p.score}"><span>${p.score}</span></div></div><p style="font-size:13px;color:#3c473f;line-height:1.8;margin-top:12px">比較候補として残す価値があります。未確認項目を減らすほど判断精度が上がります。</p></section><div class="panel-wrap" ontouchstart="swStart(event)" ontouchend="swEnd(event)"><div class="panels" style="transform:translateX(-${panel*100}%)"><div class="panel">${basic(p)}</div><div class="panel">${checks(p)}</div><div class="panel">${memos(p)}</div><div class="panel">${logs(p)}</div></div></div>`}function setPanel(i){panel=i;renderDetail()}let sx=0;function swStart(e){sx=e.changedTouches[0].clientX}function swEnd(e){let dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>55){panel=Math.max(0,Math.min(3,panel+(dx<0?1:-1)));renderDetail()}}function basic(p){let items=[['¥','価格',yen(p.price)],['%','利回り',p.yield+'%'],['🏠','家賃',p.rent],['📍','所在地',p.address],['🚉','最寄駅',p.station],['📅','築年数',p.age+'年'],['🏗️','構造',p.structure],['👤','現況',p.occupancy],['⛰️','土地',p.land],['🏢','建物',p.building],['🪟','間取り',p.plan],['🚗','駐車場',p.parking+'台'],['🛣️','接道',p.road],['🏙️','用途地域',p.zone],['🌐','情報源',p.source]];return `<section class="card"><div class="ctrow"><p class="card-title" style="margin:0">🏠 基本情報</p><button class="link-btn" onclick="editSheet()">編集</button></div><div class="info-grid">${items.map(x=>`<div class="cell"><div class="ico">${x[0]}</div><span>${x[1]}</span><b>${x[2]}</b></div>`).join('')}</div></section>`}function checks(p){return `<section class="card"><p class="card-title">📋 調査チェック</p>${p.checks.map(c=>`<div class="check"><div><b>${c[0]}</b><small>タップで変更</small></div><span class="status ${c[2]}">${c[1]}</span></div>`).join('')}<div style="margin-top:12px;font-weight:900;color:var(--g)">調査完了率 ${p.complete}%</div></section>`}function memos(p){return `<section class="card"><p class="card-title">📝 メモ</p><button class="link-btn" onclick="memoSheet()">＋ メモ追加</button><div style="height:10px"></div>${p.memos.map(m=>`<div class="memo"><b>${m[0]}</b><p>${m[1]}</p></div>`).join('')||'<p style="color:var(--muted)">まだメモはありません。</p>'}</section>`}function logs(p){return `<section class="card"><p class="card-title">🕘 ログ（自動記録）</p>${p.logs.map(l=>`<div class="log"><b>${l[0]}</b><p>${l[1]}</p></div>`).join('')}</section>`}function renderCompare(){let chosen=props.filter(p=>comp.includes(p.id));let rows=[['Score','score','max'],['価格','price','min'],['利回り','yield','max'],['築年数','age','min'],['駐車場','parking','max'],['完成度','complete','max']];compare.innerHTML=header('比較','最大5件で判断')+`<section class="card"><p class="card-title">📊 比較対象</p><div class="compare-select">${props.map(p=>`<div class="mini ${comp.includes(p.id)?'on':''}" onclick="toggleComp(${p.id})"><b>${p.title}</b><p>${p.score}点 / ${yen(p.price)}</p></div>`).join('')}</div><small style="color:var(--muted)">タップで追加・解除。最大5件。</small></section><section class="card"><p class="card-title">比較表</p><div class="comp-table" style="--n:${chosen.length}">${rows.map(r=>compRow(r,chosen)).join('')}</div></section><section class="card ai"><p class="card-title">🤖 AI比較コメント</p><p style="font-size:13px;line-height:1.8;color:#3c473f">${aiCompare(chosen)}</p><button class="save" onclick="candidateSheet()">🏆 第一候補設定</button></section>`}function val(p,k){return p[k]}function fmt(k,v){if(k==='price')return yen(v);if(k==='yield')return v+'%';if(k==='age')return v+'年';if(k==='complete')return v+'%';if(k==='parking')return v+'台';return v}function compRow(r,a){let vals=a.map(p=>val(p,r[1]));let best=r[2]==='max'?Math.max(...vals):Math.min(...vals);return `<div class="comp-row"><div class="label">${r[0]}</div>${a.map(p=>`<div class="${val(p,r[1])===best?'win':''}">${fmt(r[1],val(p,r[1]))}</div>`).join('')}</div>`}function aiCompare(a){if(!a.length)return '比較対象を追加してください。';let best=[...a].sort((x,y)=>y.score-x.score)[0];return `${best.title}が総合的に最も有力です。価格だけでなく、Score・調査完成度・駐車場条件を合わせて見ると判断しやすくなります。`}function toggleComp(id){if(comp.includes(id))comp=comp.filter(x=>x!==id);else if(comp.length<5)comp.push(id);renderCompare()}function renderSettings(){settings.innerHTML=header('設定','Project:SS')+`<section class="card"><p class="card-title">⚙️ 設定</p>${['👤 プロフィール','☁️ データバックアップ','📤 データエクスポート','🎨 テーマカラー','🔔 通知設定'].map(x=>`<div class="setting-row"><span>${x}</span><span>›</span></div>`).join('')}<div class="setting-row" onclick="dnaSheet()"><span>🧬 Development DNA</span><span>›</span></div></section><section class="card"><p class="card-title">ℹ️ アプリ情報</p><p style="font-weight:900">Project:SS</p><p style="font-size:13px;color:var(--muted);margin-top:5px">Version Alpha0.6</p><div class="signature">Built with ❤️ using AI<br>📘 Blueprint Project<br><i>"Forge by building, then refining."</i><br>Since 2026.06.30</div></section>`}function showSheet(x){sheet.innerHTML=x;sheetBg.classList.add('show');sheet.classList.add('show')}function hideSheet(){sheetBg.classList.remove('show');sheet.classList.remove('show')}sheetBg.onclick=hideSheet;function menu(){showSheet(`<div class="handle"></div><h2 class="card-title">☰ メニュー</h2><button class="opt">📘 Blueprint Project</button><button class="close" onclick="hideSheet()">閉じる</button>`)}function memoSheet(){showSheet(`<div class="handle"></div><h2 class="card-title">📝 メモ追加</h2><div class="field"><textarea placeholder="気づいたことを入力"></textarea></div><button class="save" onclick="hideSheet()">保存</button>`)}function editSheet(){showSheet(`<div class="handle"></div><h2 class="card-title">基本情報編集</h2><p style="font-size:12px;color:var(--muted);margin-bottom:10px">左右スワイプ対応想定。Alpha0.6ではUI確認版。</p><div class="field"><label>価格</label><input value="${current.price}万円"></div><div class="field"><label>利回り</label><input value="${current.yield}%"></div><button class="save" onclick="hideSheet()">保存</button>`)}function openPhotoSheet(){showSheet(`<div class="handle"></div><h2 class="card-title">🖼 写真編集</h2><button class="opt">写真変更（UI）</button><button class="opt">タグ編集：🏠 外観 / 🅿 駐車場</button><div class="field"><label>写真メモ</label><textarea>写真メモを入力</textarea></div><button class="save" onclick="hideSheet()">保存</button><button class="close" onclick="hideSheet()">キャンセル</button>`)}function statusSheet(){showSheet(`<div class="handle"></div><h2 class="card-title">ステータス変更</h2>${Object.keys(statuses).map(s=>`<button class="opt">${statuses[s][2]} ${s}</button>`).join('')}<button class="close" onclick="hideSheet()">閉じる</button>`)}function candidateSheet(){showSheet(`<div class="handle"></div><h2 class="card-title">🏆 第一候補設定</h2><p style="font-size:13px;color:var(--muted);line-height:1.8">比較結果をもとに第一候補を設定しました。ログに自動記録されます。</p><button class="save" onclick="hideSheet()">OK</button>`)}function dnaSheet(){showSheet(`<div class="handle"></div><section class="card" style="box-shadow:none;margin:0;background:#f7fbff"><p class="card-title">🧬 Development DNA</p><p style="line-height:1.9;font-size:13px">・Forge by building, then refining.<br>（作って、そして研ぎ澄ます。）<br><br>・Prototype first.<br>（まず作る。）<br><br>・Learn by using.<br>（使いながら学ぶ。）<br><br>・Every project becomes a page of Blueprint.<br>（すべてのプロジェクトはBlueprintの1ページになる。）</p></section><button class="close" onclick="hideSheet()">閉じる</button>`)}function openFS(){fs.classList.add('show')}function closeFS(){fs.classList.remove('show')}renderHome();
</script></body></html>
